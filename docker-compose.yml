name: iot_hub 
services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: iot_hub_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "mkdir -p /app/logs &&
             python manage.py makemigrations --noinput 2>&1 || true &&
             python manage.py migrate --noinput &&
             python init_db.py &&
             python load_telemetry_data.py &&
             gunicorn iot_hub.config.wsgi:application --bind 0.0.0.0:8080 --workers 4 --worker-class sync --timeout 300 --keep-alive 5 --max-requests 1000 --max-requests-jitter 50 --access-logfile - --error-logfile - --log-level info"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8080:8080"
    environment:
      PYTHONPATH: /app:/app/iot_hub
      DJANGO_SETTINGS_MODULE: iot_hub.config.settings
      DEBUG: "True"
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: iot_hub_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      SECRET_KEY: your-secret-key-change-in-production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/admin/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
  media_volume:
